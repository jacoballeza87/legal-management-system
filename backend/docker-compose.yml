version: '3.8'

# ====================================================
# IMPORTANTE: antes de levantar, compilar con:
#   cd backend && mvn clean package -DskipTests
# ====================================================

services:

  # ====================================
  # INFRASTRUCTURE
  # ====================================

  mysql:
    image: mysql:8.0
    container_name: legal-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: legal_management_db
      MYSQL_USER: legal_app
      MYSQL_PASSWORD: legal_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - legal-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: legal-redis
    ports:
      - "6379:6379"
    networks:
      - legal-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: legal-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - legal-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: legal-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - legal-network

  # ====================================
  # MICROSERVICES
  # ====================================

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: legal-config-server
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: native
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD}
    networks:
      - legal-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: legal-eureka-server
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_HOST: eureka-server
      EUREKA_USER: ${EUREKA_USER}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
    networks:
      - legal-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://eureka-server:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: legal-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://${EUREKA_USER}:${EUREKA_PASSWORD}@eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - legal-network
    restart: on-failure

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: legal-auth-service
    ports:
      - "8081:8081"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://${EUREKA_USER}:${EUREKA_PASSWORD}@eureka-server:8761/eureka/
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: legal_management_db
      DB_USER: legal_app
      DB_PASSWORD: legal_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - legal-network
    restart: on-failure

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: legal-user-service
    ports:
      - "8082:8082"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://${EUREKA_USER}:${EUREKA_PASSWORD}@eureka-server:8761/eureka/
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: legal_management_db
      DB_USER: legal_app
      DB_PASSWORD: legal_password
    networks:
      - legal-network
    restart: on-failure

  case-service:
    build:
      context: .
      dockerfile: case-service/Dockerfile
    container_name: legal-case-service
    ports:
      - "8083:8083"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://${EUREKA_USER}:${EUREKA_PASSWORD}@eureka-server:8761/eureka/
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: legal_management_db
      DB_USER: legal_app
      DB_PASSWORD: legal_password
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - legal-network
    restart: on-failure

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: legal-notification-service
    ports:
      - "8084:8084"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://${EUREKA_USER}:${EUREKA_PASSWORD}@eureka-server:8761/eureka/
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: legal_management_db
      DB_USER: legal_app
      DB_PASSWORD: legal_password
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AWS_REGION: us-east-1
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
    networks:
      - legal-network
    restart: on-failure

  document-service:
    build:
      context: .
      dockerfile: document-service/Dockerfile
    container_name: legal-document-service
    ports:
      - "8085:8085"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://${EUREKA_USER}:${EUREKA_PASSWORD}@eureka-server:8761/eureka/
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: legal_management_db
      DB_USER: legal_app
      DB_PASSWORD: legal_password
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: us-east-1
    networks:
      - legal-network
    restart: on-failure

# ====================================
# NETWORKS & VOLUMES
# ====================================
networks:
  legal-network:
    driver: bridge

volumes:
  mysql-data:
