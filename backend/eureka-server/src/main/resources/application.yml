server:
  port: 8761

spring:
  application:
    name: eureka-server


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
    com.legal: INFO
