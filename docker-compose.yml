version: "3.9"

# ═══════════════════════════════════════════════════════════════
#  Legal Management System — Docker Compose
#  SIN Eureka, SIN Kafka
#  CON RabbitMQ + Redis + MySQL + healthchecks
# ═══════════════════════════════════════════════════════════════

services:

  # ── INFRAESTRUCTURA ─────────────────────────────────────────

  mysql:
    image: mysql:8
    container_name: legal_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: legal_management_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: legal_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: legal_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── MICROSERVICIOS ──────────────────────────────────────────

  auth-service:
    build: ./backend/auth-service
    container_name: auth_service
    restart: on-failure
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: legal_management_db
      DB_USER: root
      DB_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_RABBITMQ_HOST: rabbit  mq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_SECRET: ${JWT_SECRET:-mySecretKey2024LegalSystemChangeInProduction}

  user-service:
    build: ./backend/user-service
    container_name: user_service
    restart: on-failure
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVER_PORT: 8082
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: legal_management_db
      DB_USER: root
      DB_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      JWT_SECRET: ${JWT_SECRET:-mySecretKey2024LegalSystemChangeInProduction}

  case-service:
    build: ./backend/case-service
    container_name: case_service
    restart: on-failure
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVER_PORT: 8083
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: legal_management_db
      DB_USER: root
      DB_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      JWT_SECRET: ${JWT_SECRET:-mySecretKey2024LegalSystemChangeInProduction}
      QR_BASE_URL: ${QR_BASE_URL:-http://localhost:4200}

  notification-service:
    build: ./backend/notification-service
    container_name: notification_service
    restart: on-failure
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVER_PORT: 8084
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: legal_management_db
      DB_USER: root
      DB_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      JWT_SECRET: ${JWT_SECRET:-mySecretKey2024LegalSystemChangeInProduction}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-placeholder}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-placeholder}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-placeholder}
      TWILIO_ENABLED: "false"
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-placeholder}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-placeholder}
      SES_FROM_EMAIL: ${SES_FROM_EMAIL:-noreply@legalapp.com}

  document-service:
    build: ./backend/document-service
    container_name: document_service
    restart: on-failure
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVER_PORT: 8085
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: legal_management_db
      DB_USER: root
      DB_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      JWT_SECRET: ${JWT_SECRET:-mySecretKey2024LegalSystemChangeInProduction}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-legal-documents-bucket}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-placeholder}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-placeholder}

  # ── API GATEWAY ─────────────────────────────────────────────

  api-gateway:
    build: ./backend/api-gateway
    container_name: api_gateway
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      case-service:
        condition: service_started
    environment:
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-mySecretKey2024LegalSystemChangeInProduction}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}

  # ── FRONTEND ────────────────────────────────────────────────

  frontend:
    build: ./frontend/legal-app
    container_name: legal_frontend
    restart: on-failure
    ports:
      - "4200:80"
    depends_on:
      - api-gateway

# ── VOLÚMENES ────────────────────────────────────────────────
volumes:
  mysql_data:
