version: "3.9"

services:

  mysql:
    image: mysql:8
    container_name: legal-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: legal_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  rabbitmq:
    image: rabbitmq:3-management
    container_name: legal-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  case-service:
    build: ./backend/case-service
    container_name: case-service
    depends_on:
      - mysql
      - rabbitmq
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/legal_db
      SPRING_RABBITMQ_HOST: rabbitmq
    ports:
      - "8081:8080"

  document-service:
    build: ./backend/document-service
    container_name: document-service
    depends_on:
      - mysql
      - rabbitmq
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/legal_db
      SPRING_RABBITMQ_HOST: rabbitmq
    ports:
      - "8082:8080"

  notification-service:
    build: ./backend/notification-service
    container_name: notification-service
    depends_on:
      - rabbitmq
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
    ports:
      - "8083:8080"

  api-gateway:
    build: ./backend/api-gateway
    container_name: api-gateway
    depends_on:
      - case-service
      - document-service
      - notification-service
    ports:
      - "8080:8080"

volumes:
  mysql_data: