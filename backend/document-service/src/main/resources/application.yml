server:
  port: 8085

spring:
  application:
    name: document-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:legal_management_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 55MB


jwt:
  secret: ${JWT_SECRET}

aws:
  region: ${AWS_REGION:us-east-1}
  s3:
    bucket-name: ${AWS_S3_BUCKET}
    presigned-url-expiration-minutes: 60

document:
  allowed-types: pdf,docx,xlsx,doc,xls,png,jpg,jpeg,txt,zip,rar
  max-size-bytes: 52428800

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
