<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Caso Cerrado</title>
<style>body{font-family:Arial,sans-serif;background:#f5f5f5;margin:0;padding:20px;}
.container{max-width:600px;margin:0 auto;background:white;border-radius:8px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.1);}
.header{background:#27AE60;color:white;padding:30px;text-align:center;}
.content{padding:30px;line-height:1.6;}
.footer{background:#f5f5f5;padding:20px;text-align:center;font-size:12px;color:#777;}</style>
</head>
<body>
<div class="container">
  <div class="header"><h1>✅ Caso Cerrado</h1></div>
  <div class="content">
    <p>El caso <strong th:text="${caseNumber}">CASE-2024-00001</strong> ha sido cerrado exitosamente.</p>
    <p th:text="${body}">Detalles del cierre...</p>
  </div>
  <div class="footer"><p>Legal Management System — Notificación automática</p></div>
</div>
</body></html>
