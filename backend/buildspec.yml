version: 0.2

env:
  variables:
    AWS_REGION: us-east-1
  parameter-store:
    AWS_ACCOUNT_ID: /legal/aws-account-id

phases:
  pre_build:
    commands:
      - export JAVA_HOME=/usr/lib/jvm/java-17-amazon-corretto
      - export PATH=$JAVA_HOME/bin:$PATH
      - java -version
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - export ECR_BASE=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

  build:
    commands:
      - echo Build iniciado en $(date)
      - mvn clean package -DskipTests -q
      - echo Compilacion Maven OK
      - |
        for SERVICE in eureka-server api-gateway auth-service user-service case-service notification-service document-service; do
          echo "Building $SERVICE..."
          docker build -t legal/$SERVICE:latest ./$SERVICE/
          docker tag legal/$SERVICE:latest $ECR_BASE/legal/$SERVICE:latest
          docker push $ECR_BASE/legal/$SERVICE:latest
          echo "$SERVICE pushed to ECR"
        done

  post_build:
    commands:
      - echo Build completado en $(date)