apiVersion: v1
kind: Secret
metadata:
  name: legal-system-secrets
  namespace: legal-system-prod
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
  AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
  DB_HOST: "${DB_HOST}"
  DB_PORT: "3306"
  DB_NAME: "legal_management_db"
  DB_USER: "${DB_USER}"
  DB_PASSWORD: "${DB_PASSWORD}"
  REDIS_HOST: "legal-case-system-redis.0fxlrk.0001.use1.cache.amazonaws.com"
  REDIS_PORT: "6379"
  JWT_SECRET: "${JWT_SECRET}"
  EUREKA_USER: "${EUREKA_USER}"
  EUREKA_PASSWORD: "${EUREKA_PASSWORD}"
  CONFIG_SERVER_USER: "${CONFIG_SERVER_USER}"
  CONFIG_SERVER_PASSWORD: "${CONFIG_SERVER_PASSWORD}"
  TWILIO_ACCOUNT_SID: "${TWILIO_ACCOUNT_SID}"
  TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN}"
  TWILIO_PHONE_NUMBER: "${TWILIO_PHONE_NUMBER}"
  AWS_S3_BUCKET: "${AWS_S3_BUCKET}"
  AWS_REGION: "us-east-1"
  SNS_TOPIC_ARN: "arn:aws:sns:us-east-1:509896869202:legal-case-system-notifications"
  GIT_USERNAME: "${GIT_USERNAME}"
  GIT_PASSWORD: "${GIT_PASSWORD}"
  GH_CLIENT_ID: "${GH_CLIENT_ID}"
  GH_CLIENT_SECRET: "${GH_CLIENT_SECRET}"
  GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
  GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
