spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:mysql://legal-case-system-db.cg5ygkuo00d4.us-east-1.rds.amazonaws.com:3306/legal_management_db?useSSL=true&requireSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQL8Dialect

server:
  port: 8084



aws:
  region: us-east-1
  ses:
    region: us-east-1
    from-email: noreply@ralrogolegal.com
  sns:
    topic-arn: ${SNS_TOPIC_ARN}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  phone-number: ${TWILIO_PHONE_NUMBER}

inactivity:
  alert-days: 3
  check-cron: "0 0 8 * * MON-FRI"

logging:
  level:
    com.legal.notification: DEBUG

jwt:
  secret: ${JWT_SECRET}
  issuer: legal-management-system
