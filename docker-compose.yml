version: '3.8'

services:
  # ====================================
  # INFRASTRUCTURE SERVICES
  # ====================================
  
  mysql:
    image: mysql:8.0
    container_name: legal-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: legal_management_db
      MYSQL_USER: legal_app
      MYSQL_PASSWORD: legal_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - legal-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: legal-redis
    ports:
      - "6379:6379"
    networks:
      - legal-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: legal-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - legal-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: legal-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - legal-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ====================================
  # MICROSERVICES
  # ====================================

  config-server:
    build:
      context: ./backend/config-server
      dockerfile: Dockerfile
    container_name: legal-config-server
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: native
    volumes:
      - ./backend/config-repo:/config-repo
    networks:
      - legal-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-server:
    build:
      context: ./backend/eureka-server
      dockerfile: Dockerfile
    container_name: legal-eureka-server
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
    networks:
      - legal-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: legal-auth-service
    ports:
      - "8081:8081"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:password@eureka-server:8761/eureka/

      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: legal_management_db
      DB_USER: ralrogondb
      DB_PASSWORD: Legalsys26
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-default_jwt_secret_for_development_only_change_in_production}
    networks:
      - legal-network
    restart: on-failure

  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: legal-user-service
    ports:
      - "8082:8082"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
       EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:password@eureka-server:8761/eureka/
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: legal_management_db
      DB_USER: ralrogondb
      DB_PASSWORD: Legalsys26
    networks:
      - legal-network
    restart: on-failure

  case-service:
    build:
      context: ./backend/case-service
      dockerfile: Dockerfile
    container_name: legal-case-service
    ports:
      - "8083:8083"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
       EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:password@eureka-server:8761/eureka/
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: legal_management_db
      DB_USER: ralrogondb
      DB_PASSWORD: Legalsys26
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - legal-network
    restart: on-failure

  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    container_name: legal-notification-service
    ports:
      - "8084:8084"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
       EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:password@eureka-server:8761/eureka/
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: legal_management_db
      DB_USER: ralrogondb
      DB_PASSWORD: Legalsys26
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
    networks:
      - legal-network
    restart: on-failure

  document-service:
    build:
      context: ./backend/document-service
      dockerfile: Dockerfile
    container_name: legal-document-service
    ports:
      - "8085:8085"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
       EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:password@eureka-server:8761/eureka/
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: legal_management_db
      DB_USER: ralrogondb
      DB_PASSWORD: Legalsys26
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      GOOGLE_SERVICE_ACCOUNT_PATH: ${GOOGLE_SERVICE_ACCOUNT_PATH}
    volumes:
      - ./config/service-account.json:/config/service-account.json:ro
    networks:
      - legal-network
    restart: on-failure

  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: legal-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy

    networks:
      - legal-network
    restart: on-failure

  # ====================================
  # FRONTEND
  # ====================================

  frontend:
    build:
      context: ./frontend/legal-app
      dockerfile: Dockerfile
      args:
        CONFIGURATION: development
    container_name: legal-frontend
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
    networks:
      - legal-network

  # ====================================
  # MONITORING (Optional)
  # ====================================

  prometheus:
    image: prom/prometheus:latest
    container_name: legal-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - legal-network

  grafana:
    image: grafana/grafana:latest
    container_name: legal-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - legal-network

# ====================================
# NETWORKS
# ====================================
networks:
  legal-network:
    driver: bridge

# ====================================
# VOLUMES
# ====================================
volumes:
  mysql-data:
  prometheus-data:
  grafana-data:
