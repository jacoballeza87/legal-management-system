# ============================================
# API GATEWAY
# — Espera config-server y eureka-server
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: legal-system-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      # -------------------------------------------------
      # Init containers: orden garantizado
      # 1. config-server debe estar UP
      # 2. eureka-server debe estar UP
      # -------------------------------------------------
      initContainers:
        - name: wait-for-config
          image: curlimages/curl:8.5.0
          command:
            - sh
            - -c
            - |
              echo "Esperando config-server..."
              until curl -sf http://config-server:8888/actuator/health; do
                echo "config-server no listo, reintentando en 5s..."
                sleep 5
              done
              echo "config-server listo!"
        - name: wait-for-auth
          image: curlimages/curl:8.5.0
          command:
            - sh
            - -c
            - |
              echo "Esperando auth-service..."
              until curl -sf http://auth-service:8081/actuator/health; do
                echo "auth-service no listo, reintentando en 5s..."
                sleep 5
              done
              echo "auth-service listo!"
      containers:
        - name: api-gateway
          image: ${ECR_BASE}/legal/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: CONFIG_SERVER_URL
              value: "http://config-server:8888"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: legal-system-secrets
                  key: JWT_SECRET
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: legal-system-secrets
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: legal-system-secrets
                  key: REDIS_PORT
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 50
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: legal-system-prod
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer